services:
  db:
    image: postgres:16-alpine
    container_name: amazon-shortener-db
    environment:
      POSTGRES_DB: amazon_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amazon_shortener"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test-db:
    image: postgres:16-alpine
    container_name: amazon-shortener-test-db
    environment:
      POSTGRES_DB: amazon_shortener_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amazon_shortener_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  backend:
    build: .
    profiles: ["app"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/amazon_shortener
      PUBLIC_SCHEME: https
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  postgres_test_data:
